<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimaI T2I - プロンプトメーカー</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- ヘッダー -->
        <header class="app-header">
            <div class="header-content">
                <div class="title-group">
                    <h1>AnimaI T2I</h1>
                    <p class="subtitle">クリックでつくる画像生成AIプロンプト作成ツール</p>
                </div>
                <div class="header-controls">
                    <button id="theme-toggle-btn" class="theme-toggle-btn" title="テーマを切り替え">
                        <span class="theme-icon-sun">☀️</span>
                        <span class="theme-icon-moon" style="display: none;">🌙</span>
                    </button>
                    <label class="switch-container">
                        <input type="checkbox" id="nsfw-toggle">
                        <span class="switch-slider"></span>
                        <span class="switch-label">NSFWタグを表示</span>
                    </label>
                </div>
            </div>
        </header>

        <!-- メインコンテンツエリア -->
        <main class="app-main">
            <!-- 左側：タグ選択エリア -->
            <section class="tag-selection-section">
                <!-- タブメニュー -->
                <div class="tab-container">
                    <button class="tab-btn active" data-tab="sfw">ポジティブプロンプト (通常)</button>
                    <button class="tab-btn" data-tab="nsfw" id="nsfw-tab-btn" style="display: none;">ポジティブプロンプト (NSFW)</button>
                    <button class="tab-btn" data-tab="negative">ネガティブプロンプト</button>
                </div>

                <!-- 各タブのコンテンツ -->
                <div class="tab-panels">
                    <!-- SFWパネル -->
                    <div class="tab-panel active" id="panel-sfw">
                        <div class="category-grid" id="sfw-categories">
                            <!-- JSで動的に追加されます -->
                            <div class="loading">データを読み込んでいます...</div>
                        </div>
                    </div>

                    <!-- NSFWパネル -->
                    <div class="tab-panel" id="panel-nsfw">
                        <div class="category-grid" id="nsfw-categories">
                            <!-- JSで動的に追加されます -->
                        </div>
                    </div>

                    <!-- ネガティブパネル -->
                    <div class="tab-panel" id="panel-negative">
                        <div class="category-grid" id="negative-categories">
                            <!-- JSで動的に追加されます -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- 右側：プレビュー＆操作エリア -->
            <section class="preview-section">
                <div class="sticky-preview-container">
                    <!-- ポジティブプロンプトプレビュー -->
                    <div class="preview-card" id="positive-preview-card">
                        <div class="preview-header">
                            <h2>ポジティブプロンプト (Positive Prompt)</h2>
                            <div class="badge positive-badge">SFW</div>
                        </div>
                        <div class="textarea-wrapper">
                            <textarea id="positive-prompt-output" readonly placeholder="タグを選択すると、ここにプロンプトが自動生成されます..."></textarea>
                        </div>
                        <div class="preview-actions">
                            <div class="manual-input-group">
                                <input type="text" id="manual-positive-input" placeholder="カスタムタグを入力...">
                                <button id="add-manual-positive-btn">追加</button>
                            </div>
                            <div class="action-buttons">
                                <button class="btn btn-secondary" id="clear-positive-btn">クリア</button>
                                <button class="btn btn-primary btn-copy" id="copy-positive-btn">
                                    <span class="copy-text">コピー</span>
                                    <span class="copy-success-text" style="display: none;">コピー完了！</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- ネガティブプロンプトプレビュー -->
                    <div class="preview-card">
                        <div class="preview-header">
                            <h2>ネガティブプロンプト (Negative Prompt)</h2>
                        </div>
                        <div class="textarea-wrapper">
                            <textarea id="negative-prompt-output" readonly placeholder="ネガティブタグを選択すると、ここにプロンプトが自動生成されます..."></textarea>
                        </div>
                        <div class="preview-actions">
                            <div class="manual-input-group">
                                <input type="text" id="manual-negative-input" placeholder="カスタムタグを入力...">
                                <button id="add-manual-negative-btn">追加</button>
                            </div>
                            <div class="action-buttons">
                                <button class="btn btn-secondary" id="clear-negative-btn">クリア</button>
                                <button class="btn btn-primary btn-copy" id="copy-negative-btn">
                                    <span class="copy-text">コピー</span>
                                    <span class="copy-success-text" style="display: none;">コピー完了！</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- フッター -->
        <footer class="app-footer">
            <p>&copy; 2026 AnimaI T2I. Created for beautiful generation.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
